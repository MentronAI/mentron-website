<div id="tooltip"></div>
<script>
const tooltip = document.getElementById('tooltip');
document.querySelectorAll('.node').forEach(n => {
  n.addEventListener('mouseenter', (e) => {
    const label = n.getAttribute('data-label');
    const sub = n.getAttribute('data-sub');
    const url = n.getAttribute('data-url');
    const status = n.getAttribute('data-status');
    const statusLabel = {written: '✅ Written', planned: '📝 Planned', 'tagged-written-but-missing': '⚠️ Flagged issue', pillar: '⭐ Pillar'}[status] || status;
    tooltip.innerHTML = `<div style="font-weight:600;margin-bottom:4px">${label}</div><div style="color:#9ca3af;margin-bottom:4px">${sub}</div><div style="margin-bottom:6px">${statusLabel}</div><a href="${url}" target="_blank">Open post →</a>`;
    tooltip.style.opacity = 1;
  });
  n.addEventListener('mousemove', (e) => {
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY + 14) + 'px';
  });
  n.addEventListener('mouseleave', () => {
    tooltip.style.opacity = 0;
  });
  n.addEventListener('click', () => {
    const url = n.getAttribute('data-url');
    if (url) window.open(url, '_blank');
  });
});
</script>
